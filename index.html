<!DOCTYPE html>
<html>

<head>

    <title>Birthday Surprise</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(to right,#ff758c,#ff7eb3);
            text-align:center;
            overflow-x:hidden;
            color:white;
        }

        .main{
            padding-top:50px;
            position:relative;
            z-index:2;
        }

        h1{
            font-size:60px;
        }

        p{
            font-size:25px;
        }

        .gallery{
            margin-top:40px;
        }

        .gallery img{

            width:250px;
            height:250px;
            object-fit:cover;

            border-radius:20px;

            margin:15px;

            box-shadow:0 0 20px rgba(0,0,0,0.4);

            transition:0.5s;
        }

        .gallery img:hover{
            transform:scale(1.08);
        }

        button{

            margin-top:30px;

            padding:15px 30px;

            border:none;

            border-radius:15px;

            font-size:20px;

            background:white;

            color:#ff4f81;

            cursor:pointer;
        }

        #message{

            margin-top:30px;

            font-size:30px;

            padding-bottom:50px;
        }

        .heart{

            position:fixed;

            top:-20px;

            font-size:30px;

            animation:fall 5s linear forwards;

            z-index:1;
        }

        @keyframes fall{

            0%{
                transform:translateY(0);
                opacity:1;
            }

            100%{
                transform:translateY(100vh);
                opacity:0;
            }

        }

    </style>

</head>

<body>

    <div class="main">

        <h1>Happy Birthday 🎂</h1>

        <p>Every memory with you is special 💖</p>

        <div class="gallery">

            <img src="photo1.jpeg">
            <img src="photo2.jpeg">
            <img src="photo3.jpeg">

        </div>

        <button onclick="showMessage()">

            Click For Surprise 🎁

        </button>

        <h2 id="message"></h2>

    </div>

    <script>

        function showMessage(){

            document.getElementById("message").innerHTML =
            "You are the most beautiful part of my life 💕";

        }

        function createHeart(){

            const heart = document.createElement("div");

            heart.classList.add("heart");

            heart.innerHTML = "❤️";

            heart.style.left = Math.random() * 100 + "vw";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            },5000);

        }

        setInterval(createHeart,500);

    </script>

</body>

</html>
