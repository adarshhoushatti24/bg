<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday</title>

    <style>
        body{
            background: linear-gradient(to right,pink,purple);
            font-family: Arial;
            text-align:center;
            color:white;
            margin-top:150px;
        }

        button{
            padding:12px 20px;
            border:none;
            border-radius:10px;
            font-size:18px;
        }
    </style>
</head>

<body>

    <h1>Happy Birthday 🎂</h1>

    <p>You are very special 💖</p>

    <button onclick="showMessage()">
        Click Me
    </button>

    <h2 id="msg"></h2>

    <script>
        function showMessage(){
            document.getElementById("msg").innerHTML=
            "Wishing you happiness forever 💕";
        }
    </script>

</body>
</html>
